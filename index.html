<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidget Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="hero">
            <h1>Welcome to <span class="highlight">Fidget Factory</span></h1>
            <p class="tagline">Buy it! I dare you.</p>
        </section>

        <section class="projects">
            <h2>Products</h2>
            <div class="project-grid">
                <div class="product-card">
                    <h3>Spinny Thing!</h3>
                    <p>Go Spin Spin</p>
                </div>
                <div class="product-card">
                    <h3>Octapussy</h3>
                    <p>Eight arms of fidgeting fun</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Made by Fidget Factory</p>
    </footer>
</body>
</html>
